name: Open Scriptures Corpus Build

on:
  push:
    branches: [open-scriptures-corpus-build-20260712]
    paths:
      - .github/workflows/open-scriptures-corpus.yml
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build pinned Japanese selections
        run: python build_selected.py
      - name: Upload corpus artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-scriptures-japanese-selected
          path: |
            japanese-selected.json
            BUILD_REPORT.txt
          if-no-files-found: error
          retention-days: 7
